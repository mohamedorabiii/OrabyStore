services:
  php:
    build:
      args:
        user: orabii
        uid: 1000
      context: .
      dockerfile: Dockerfile
    container_name: orabystore_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www/
    environment:
      - "DB_HOST=mysql"
      - "DB_DATABASE=orabystore"
      - "DB_USERNAME=orabystore"
      - "DB_PASSWORD=orabystore"
      - "REDIS_HOST=redis"
      - "REDIS_PORT=6379"
      - "MEILISEARCH_HOST=http://meilisearch:7700"
    networks:
      - orabystore

  nginx:
    image: nginx:alpine
    container_name: orabystore_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - orabystore

  mysql:
    image: mariadb:10.5
    container_name: orabystore_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: orabystore
      MYSQL_DATABASE: orabystore
      MYSQL_USER: orabystore
      MYSQL_PASSWORD: orabystore
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - orabystore

  phpmyadmin:
    image: phpmyadmin
    container_name: orabystore_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
    networks:
      - orabystore

  redis:
    image: redis:alpine
    container_name: orabystore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - orabystore

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: orabystore_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - orabystore

networks:
  orabystore:
    driver: bridge

volumes:
  dbdata:
    driver: local
  meilisearch_data:
    driver: local