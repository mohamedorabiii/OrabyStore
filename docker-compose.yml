version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orabystore_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - orabystore

  webserver:
    image: nginx:alpine
    container_name: orabystore_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - orabystore

  db:
    image: mysql:8.0
    container_name: orabystore_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orabystore
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: orabystore
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - orabystore

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: orabystore_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - orabystore

networks:
  orabystore:
    driver: bridge

volumes:
  dbdata:
    driver: local